name: Fetch Binance Data

on:
  schedule:
    - cron: "0 * * * *"   # mỗi 1 giờ
  workflow_dispatch:        # cho phép chạy tay

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests python-dotenv

      - name: Debug secrets
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: |
          python -c "import os; print('KEY exists:', bool(os.getenv('BINANCE_API_KEY'))); print('SECRET exists:', bool(os.getenv('BINANCE_API_SECRET')))"
      
      - name: Run fetch
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: python fetch_data.py

      - name: Commit DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add binance.db
          git diff --staged --quiet || git commit -m "chore: update binance.db $(date -u '+%Y-%m-%d %H:%M')"
          git push